<svg 
xmlns="http://www.w3.org/2000/svg" 
viewBox="0 0 512 512"
>

<!-- Background -->
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#86efac"/>
    <stop offset="100%" stop-color="#16a34a"/>
  </linearGradient>

  <linearGradient id="tractor" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#22c55e"/>
    <stop offset="100%" stop-color="#15803d"/>
  </linearGradient>
</defs>


<rect
width="512"
height="512"
rx="100"
fill="url(#sky)"
/>


<!-- Sun -->
<circle
cx="390"
cy="120"
r="55"
fill="#fde047"
/>


<!-- Farm Land -->
<path
d="M0 330 Q256 250 512 330 V512 H0Z"
fill="#92400e"
/>

<path
d="M0 390 Q256 310 512 390 V512 H0Z"
fill="#65a30d"
/>


<!-- Tractor Main Body -->
<rect
x="140"
y="250"
width="210"
height="100"
rx="20"
fill="url(#tractor)"
/>


<!-- Cabin -->
<path
d="M210 250 V170 Q210 140 240 140 H320 Q340 140 340 170 V250Z"
fill="#166534"
/>


<!-- Cabin Glass -->
<rect
x="245"
y="165"
width="70"
height="65"
rx="8"
fill="#bfdbfe"
/>


<!-- Exhaust -->
<rect
x="320"
y="120"
width="12"
height="55"
fill="#374151"
/>


<!-- Big Wheel -->
<circle
cx="190"
cy="370"
r="70"
fill="#111827"
/>

<circle
cx="190"
cy="370"
r="35"
fill="#9ca3af"
/>


<!-- Small Wheel -->
<circle
cx="370"
cy="370"
r="45"
fill="#111827"
/>

<circle
cx="370"
cy="370"
r="20"
fill="#9ca3af"
/>


<!-- Head Light -->
<circle
cx="350"
cy="275"
r="12"
fill="#facc15"
/>


<!-- Front Bumper -->
<rect
x="350"
y="300"
width="50"
height="15"
rx="5"
fill="#374151"
/>


</svg>
