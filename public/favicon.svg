<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

<defs>

<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#60a5fa"/>
<stop offset="100%" stop-color="#dbeafe"/>
</linearGradient>

<linearGradient id="tractor" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#2563eb"/>
<stop offset="100%" stop-color="#1e40af"/>
</linearGradient>

</defs>


<!-- Background Sky -->
<rect width="512" height="512" fill="url(#sky)"/>


<!-- Sun -->
<circle
cx="390"
cy="120"
r="55"
fill="#facc15"
/>


<!-- Farm -->
<path
d="M0 300 Q250 240 512 300 V512 H0Z"
fill="#65a30d"
/>

<!-- Crop Lines -->
<path
d="M0 390 Q250 320 512 390"
stroke="#166534"
stroke-width="12"
fill="none"
/>

<path
d="M0 440 Q250 370 512 440"
stroke="#15803d"
stroke-width="10"
fill="none"
/>


<!-- Farmer -->
<circle
cx="105"
cy="250"
r="25"
fill="#d97706"
/>

<path
d="M75 290 Q105 260 135 290 L145 390 H65Z"
fill="#166534"
/>

<!-- Farmer Hat -->
<path
d="M75 225 Q105 190 135 225"
fill="#92400e"
/>


<!-- Blue Tractor Body -->
<rect
x="170"
y="260"
width="210"
height="90"
rx="15"
fill="url(#tractor)"
/>


<!-- Cabin -->
<path
d="M220 260 V170 Q220 140 250 140 H330 Q350 140 350 170 V260Z"
fill="#1d4ed8"
/>


<!-- Glass -->
<rect
x="255"
y="165"
width="70"
height="60"
rx="8"
fill="#bfdbfe"
/>


<!-- Big Wheel -->
<circle
cx="220"
cy="370"
r="65"
fill="#111827"
/>

<circle
cx="220"
cy="370"
r="28"
fill="#9ca3af"
/>


<!-- Small Wheel -->
<circle
cx="390"
cy="370"
r="40"
fill="#111827"
/>

<circle
cx="390"
cy="370"
r="18"
fill="#9ca3af"
/>


<!-- Tractor Light -->
<circle
cx="370"
cy="285"
r="10"
fill="#fde047"
/>


</svg>
