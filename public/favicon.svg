<svg 
xmlns="http://www.w3.org/2000/svg" 
viewBox="0 0 512 512">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#22c55e"/>
<stop offset="100%" stop-color="#14532d"/>
</linearGradient>

<linearGradient id="tractor" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#65a30d"/>
<stop offset="100%" stop-color="#166534"/>
</linearGradient>

</defs>


<!-- Rounded App Background -->
<rect
width="512"
height="512"
rx="120"
fill="url(#bg)"
/>


<!-- Sun -->
<circle
cx="390"
cy="120"
r="55"
fill="#facc15"
/>


<!-- Mountains -->
<path
d="M0 270 L120 150 L230 270 L350 130 L512 270"
fill="#15803d"
/>


<!-- Farm Ground -->
<path
d="M0 340 Q256 260 512 340 V512 H0Z"
fill="#854d0e"
/>

<path
d="M0 410 Q256 320 512 410 V512 H0Z"
fill="#65a30d"
/>


<!-- Tractor Body -->
<path
d="M120 250 H350 Q380 250 400 290 V350 H120Z"
fill="url(#tractor)"
/>


<!-- Tractor Cabin -->
<path
d="M210 250 V160 Q210 130 245 130 H330 Q350 130 350 160 V250Z"
fill="#166534"
/>


<!-- Glass -->
<rect
x="245"
y="160"
width="75"
height="65"
rx="8"
fill="#bfdbfe"
/>


<!-- Exhaust -->
<rect
x="330"
y="90"
width="14"
height="70"
fill="#374151"
/>


<!-- Big Wheel -->
<circle
cx="185"
cy="370"
r="72"
fill="#111827"
/>

<circle
cx="185"
cy="370"
r="32"
fill="#d1d5db"
/>


<!-- Small Wheel -->
<circle
cx="380"
cy="370"
r="45"
fill="#111827"
/>

<circle
cx="380"
cy="370"
r="20"
fill="#d1d5db"
/>


<!-- Head Lamp -->
<circle
cx="400"
cy="290"
r="12"
fill="#fde047"
/>


<!-- Front Grill -->
<rect
x="405"
y="315"
width="35"
height="8"
